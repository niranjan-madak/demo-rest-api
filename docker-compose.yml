version: '3.8'

services:
  demo-rest-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-rest-api-container
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xms512m -Xmx1024m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/hello"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - demo-network

networks:
  demo-network:
    driver: bridge
